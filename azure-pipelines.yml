trigger:
  branches:
    include:
      - master

pool:
  name: Default

variables:
  buildConfiguration: Release
  acrLoginServer: weatherplatformregistry.azurecr.io
  acrServiceConnection: acr-connection

jobs:
  - job: Build_BackendForFrontend
    displayName: Build BackendForFrontend
    steps:
      - template: azure-pipelines/build.yml
        parameters:
          displayName: BackendForFrontend
          repository: backendforfrontend
          dockerfile: services/BackendForFrontend/Dockerfile
          containerRegistry: $(acrServiceConnection)

  - job: Build_Frontend
    displayName: Build Frontend
    steps:
      - template: azure-pipelines/build.yml
        parameters:
          displayName: Frontend
          repository: frontend
          dockerfile: frontend/Frontend/Dockerfile
          containerRegistry: $(acrServiceConnection)

  - job: Build_GeocodingService
    displayName: Build GeocodingService
    steps:
      - template: azure-pipelines/build.yml
        parameters:
          displayName: GeocodingService
          repository: geocodingservice
          dockerfile: services/GeocodingService/Dockerfile
          containerRegistry: $(acrServiceConnection)

  - job: Build_WeatherService
    displayName: Build WeatherService
    steps:
      - template: azure-pipelines/build.yml
        parameters:
          displayName: WeatherService
          repository: weatherservice
          dockerfile: services/WeatherService/Dockerfile
          containerRegistry: $(acrServiceConnection)

  - job: Deploy_Containers
    displayName: Deploy with Docker Compose
    dependsOn:
      - Build_BackendForFrontend
      - Build_Frontend
      - Build_GeocodingService
      - Build_WeatherService
    steps:
      - template: azure-pipelines/deploy-compose.yml
        parameters:
          composeFile: docker-compose.yml
          containerRegistry: $(acrServiceConnection)
          registryLoginServer: $(acrLoginServer)